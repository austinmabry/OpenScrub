ShortDescription: Local video redaction — detect and blur faces, license plates, and on-screen PII with human review.
Description: >-
  OpenScrub detects and blurs PII in videos and screen recordings entirely on
  your own machine: faces (grouped by identity), full-body silhouettes,
  license plates, and on-screen text such as names, SSNs, addresses and
  custom regex patterns. Every detection is shown for human review before
  rendering. GPU-accelerated on NVIDIA hardware; nothing is uploaded.
