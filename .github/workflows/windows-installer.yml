# Builds the native Windows installer on every published release and
# attaches OpenScrub-Setup-<version>.exe to that release automatically.
#
# Runs the exact same build a developer would run locally
# (windows\build_installer.bat -> PyInstaller + Inno Setup), so the
# release asset and a hand-built installer are interchangeable.

name: Windows installer

on:
  release:
    types: [published]

jobs:
  build-installer:
    name: Build and attach setup exe
    runs-on: windows-latest
    permissions:
      contents: write        # needed to upload the release asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenScrub and its dependencies
        run: python -m pip install .

      - name: Ensure Inno Setup is present
        shell: pwsh
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }

      - name: Build exes and installer
        shell: cmd
        run: windows\build_installer.bat

      - name: Verify the installer was produced
        shell: pwsh
        run: |
          $exe = Get-ChildItem windows/output/OpenScrub-Setup-*.exe -ErrorAction SilentlyContinue
          if (-not $exe) { Write-Error "installer exe not found — build failed"; exit 1 }
          Write-Host "built: $($exe.FullName) ($([math]::Round($exe.Length/1MB)) MB)"

      - name: Attach installer to the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = (Get-ChildItem windows/output/OpenScrub-Setup-*.exe).FullName
          gh release upload "${{ github.event.release.tag_name }}" "$exe" --clobber
