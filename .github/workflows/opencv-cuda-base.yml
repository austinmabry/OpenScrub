# Builds the CUDA-enabled OpenCV BASE image that Dockerfile.cuda builds FROM.
#
# Run this MANUALLY and RARELY — only when the OpenCV or CUDA version
# changes. It is intentionally NOT tied to releases: the whole point is
# that this ~1 GB layer keeps a stable digest so normal OpenScrub releases
# never rebuild or re-ship it, and users never re-download it on a version
# bump.
#
# Compiling OpenCV with CUDA for several GPU architectures takes ~1-2 hours.
# After it publishes, bump the FROM tag in Dockerfile.cuda to match, then
# cut a normal release as usual.

name: OpenCV CUDA base image

on:
  workflow_dispatch:
    inputs:
      opencv_version:
        description: "OpenCV git tag to build (e.g. 4.10.0)"
        required: true
        default: "4.10.0"
      arches:
        description: "CUDA_ARCH_BIN — arches to compile NATIVE SASS for
          (all other NVIDIA GPUs still work via the embedded PTX 5.2 JIT)"
        required: true
        default: "6.1;7.5;8.6;8.9"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Free runner disk (source build needs space)
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.opencv-cuda
          push: true
          build-args: |
            OPENCV_VERSION=${{ github.event.inputs.opencv_version }}
            CUDA_ARCH_BIN=${{ github.event.inputs.arches }}
          tags: |
            ghcr.io/austinmabry/opencv-cuda:${{ github.event.inputs.opencv_version }}-cu126
            ghcr.io/austinmabry/opencv-cuda:latest
