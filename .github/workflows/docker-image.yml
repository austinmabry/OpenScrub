# Builds the server Docker images on every published release and pushes
# them to BOTH registries, fully automatically — publish the release and
# walk away:
#   ghcr.io/austinmabry/openscrub:<version>, :latest   (+ -cuda, :cuda)
#   docker.io/pharmhero/openscrub:<version>, :latest   (+ -cuda, :cuda)
#
# GHCR auth is the built-in GITHUB_TOKEN. Docker Hub auth needs ONE repo
# secret: DOCKERHUB_TOKEN (a Docker Hub personal access token with
# Read & Write scope, created at hub.docker.com -> Account settings ->
# Personal access tokens). Until that secret exists, the workflow simply
# pushes GHCR-only — it never fails on a missing token.
# Free on both sides: Actions is free for public repos, Docker Hub's free
# plan hosts unlimited public repositories.

name: Docker image

on:
  release:
    types: [published]
  # Weekly security refresh: rebuild the LATEST RELEASE with --no-cache so
  # the apt dist-upgrade layer re-runs and published tags absorb the Debian/
  # Ubuntu security patches that shipped since the release was cut. Same
  # code, fresher packages — this is what keeps Docker Scout counts down
  # between releases.
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version label for the images (e.g. v1.0.17). Manual
          runs build with the Dockerfiles of the branch you dispatch on."
        required: true

env:
  DOCKERHUB_USER: pharmhero

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0    # scheduled refresh needs tags to find the release

      - name: Compute tags
        id: meta
        run: |
          RAW="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          if [ -z "$RAW" ]; then
            # scheduled refresh: build the latest release's code, not main
            RAW="$(git describe --tags --abbrev=0)"
            git checkout "$RAW"
            echo "::notice::scheduled refresh of $RAW"
          fi
          V="${RAW#v}"
          TAGS="ghcr.io/austinmabry/openscrub:${V}"
          TAGS="$TAGS,ghcr.io/austinmabry/openscrub:latest"
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            TAGS="$TAGS,docker.io/${DOCKERHUB_USER}/openscrub:${V}"
            TAGS="$TAGS,docker.io/${DOCKERHUB_USER}/openscrub:latest"
          else
            echo "::notice::DOCKERHUB_TOKEN secret not set — pushing to GHCR only"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      # arm64: Apple Silicon Docker Desktop + ARM servers/NAS (Umbrel,
      # CasaOS on Pi). Scans are CPU-bound — slow on a Pi, fine on M-series.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          no-cache: ${{ github.event_name == 'schedule' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # registry build cache: unchanged layers (base, apt, the pip
          # dependency stack) keep their exact digests across releases, so
          # users pulling a new version only download the small app layers
          cache-from: type=registry,ref=ghcr.io/austinmabry/openscrub:buildcache
          cache-to: type=registry,ref=ghcr.io/austinmabry/openscrub:buildcache,mode=max

  build-image-cuda:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0    # scheduled refresh needs tags to find the release

      - name: Free runner disk (CUDA image is large)
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet                       /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Compute tags
        id: meta
        run: |
          RAW="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          if [ -z "$RAW" ]; then
            # scheduled refresh: build the latest release's code, not main
            RAW="$(git describe --tags --abbrev=0)"
            git checkout "$RAW"
            echo "::notice::scheduled refresh of $RAW"
          fi
          V="${RAW#v}"
          TAGS="ghcr.io/austinmabry/openscrub:${V}-cuda"
          TAGS="$TAGS,ghcr.io/austinmabry/openscrub:cuda"
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            TAGS="$TAGS,docker.io/${DOCKERHUB_USER}/openscrub:${V}-cuda"
            TAGS="$TAGS,docker.io/${DOCKERHUB_USER}/openscrub:cuda"
          else
            echo "::notice::DOCKERHUB_TOKEN secret not set — pushing to GHCR only"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cuda
          no-cache: ${{ github.event_name == 'schedule' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # registry build cache: the multi-GB CUDA/Paddle layers keep their
          # exact digests across releases — version-to-version pulls only
          # download the small app layers
          cache-from: type=registry,ref=ghcr.io/austinmabry/openscrub:buildcache-cuda
          cache-to: type=registry,ref=ghcr.io/austinmabry/openscrub:buildcache-cuda,mode=max
